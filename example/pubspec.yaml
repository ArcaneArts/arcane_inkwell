name: arcane_lexicon_example
description: Example knowledge base using arcane_lexicon
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  web: ^1.1.1
  arcane_lexicon:
    path: ../
  jaspr: ^0.22.3
  jaspr_content: ^0.5.0

dev_dependencies:
  build_runner: ^2.11.1
  build_web_compilers: ^4.4.14
  jaspr_builder: ^0.22.3
  lints: ^6.1.0

jaspr:
  mode: static

scripts:
  serve: jaspr serve
  build: jaspr build
  clean: jaspr clean
